{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
                <h4>Profile Information</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" value="{{ user.username }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="email_reminder_enabled" id="reminderToggle" class="form-check-input" {% if profile.email_reminder_enabled %}checked{% endif %}>
                        <label for="reminderToggle" class="form-check-label">Receive email reminders</label>
                    </div>
                    <button type="submit" name="update_profile" class="btn btn-primary">Save Profile</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4>Change Password</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ password_form.as_p }}
                    <button type="submit" name="change_password" class="btn btn-warning">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
